name: Sync to Hugging Face Spaces
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push https://larry5432112345:$HF_TOKEN@huggingface.co/spaces/larry5432112345/tc-profile-video main --force
